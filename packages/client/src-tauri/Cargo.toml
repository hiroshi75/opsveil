[package]
name = "opsveil"
version = "0.1.0"
description = "OpsVeil - Agent Command Center IDE"
authors = []
edition = "2021"

[lib]
name = "opsveil_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[[bin]]
name = "opsveil"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
